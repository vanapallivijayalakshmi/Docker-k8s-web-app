apiVersion: apps/v1
kind: Deployment
metadata:
  name: docker-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: docker-app
  template:
    metadata:
      labels:
        app: docker-app
    spec:
      containers:
      - name: docker-app
        image: cicd-project-web:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 80
